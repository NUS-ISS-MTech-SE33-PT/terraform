name: API Tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Hurl
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Orange-OpenSource/hurl/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -LO "https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl_${VERSION}_amd64.deb"
          sudo dpkg -i "hurl_${VERSION}_amd64.deb"

      - name: Run API tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          TEST_NORMAL_USERNAME_A: ${{ secrets.TEST_NORMAL_USERNAME_A }}
          TEST_NORMAL_PASSWORD_A: ${{ secrets.TEST_NORMAL_PASSWORD_A }}
          TEST_NORMAL_USERNAME_B: ${{ secrets.TEST_NORMAL_USERNAME_B }}
          TEST_NORMAL_PASSWORD_B: ${{ secrets.TEST_NORMAL_PASSWORD_B }}
          TEST_ADMIN_USERNAME: ${{ secrets.TEST_ADMIN_USERNAME }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_SPOT_ID: ${{ secrets.TEST_SPOT_ID }}
        run: |
          hurl --test \
            --error-format long \
            --variable api_base_url="$API_BASE_URL" \
            --variable cognito_client_id="$COGNITO_CLIENT_ID" \
            --variable test_normal_username_a="$TEST_NORMAL_USERNAME_A" \
            --variable test_normal_password_a="$TEST_NORMAL_PASSWORD_A" \
            --variable test_normal_username_b="$TEST_NORMAL_USERNAME_B" \
            --variable test_normal_password_b="$TEST_NORMAL_PASSWORD_B" \
            --variable test_admin_username="$TEST_ADMIN_USERNAME" \
            --variable test_admin_password="$TEST_ADMIN_PASSWORD" \
            --variable test_spot_id="$TEST_SPOT_ID" \
            --variable expired_access_token="$EXPIRED_ACCESS_TOKEN" \
            .github/hurl/spot_service.hurl \
            .github/hurl/review_service_guard.hurl \
            .github/hurl/review_service.hurl \
            .github/hurl/spot_submission_service_guard.hurl \
            .github/hurl/spot_submission_service.hurl \
            .github/hurl/c01_review_service.hurl \
            .github/hurl/c01_spot_submission_service.hurl \
            .github/hurl/c02_spot_submission_service.hurl \
            .github/hurl/c04_api_gateway.hurl
