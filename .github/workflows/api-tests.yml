name: API Tests

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Hurl
        run: |
          VERSION=$(curl -s https://api.github.com/repos/Orange-OpenSource/hurl/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -LO "https://github.com/Orange-OpenSource/hurl/releases/download/${VERSION}/hurl_${VERSION}_amd64.deb"
          sudo dpkg -i "hurl_${VERSION}_amd64.deb"

      - name: Run API tests
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_USERNAME_B: ${{ secrets.TEST_USERNAME_B }}
          TEST_PASSWORD_B: ${{ secrets.TEST_PASSWORD_B }}
          TEST_SPOT_ID: ${{ secrets.TEST_SPOT_ID }}
        run: |
          hurl --test \
            --error-format long \
            --variable api_base_url="$API_BASE_URL" \
            --variable cognito_client_id="$COGNITO_CLIENT_ID" \
            --variable test_username="$TEST_USERNAME" \
            --variable test_password="$TEST_PASSWORD" \
            --variable test_username_b="$TEST_USERNAME_B" \
            --variable test_password_b="$TEST_PASSWORD_B" \
            --variable test_spot_id="$TEST_SPOT_ID" \
            .github/hurl/spot_service.hurl \
            .github/hurl/review_service_guard.hurl \
            .github/hurl/review_service.hurl \
            .github/hurl/spot_submission_service_guard.hurl \
            .github/hurl/spot_submission_service.hurl \
            .github/hurl/c01_review_service.hurl \
            .github/hurl/c01_spot_submission_service.hurl
