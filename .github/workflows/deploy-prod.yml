name: Deploy Prod
on:
  workflow_dispatch:

concurrency:
  group: terraform-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Build ClamAV Lambda layer
        working-directory: .
        run: ./scripts/build-clamav-layer.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Promote to prod tag
        run: |
          # Extract version: v0.0.3-rc.1 → v0.0.3
          VERSION="${GITHUB_REF_NAME}"           # e.g. v0.0.3-rc.1
          PROD_TAG="${VERSION%-rc.*}-prod"        # e.g. v0.0.3-prod

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$PROD_TAG"
          git push origin "$PROD_TAG"
          
