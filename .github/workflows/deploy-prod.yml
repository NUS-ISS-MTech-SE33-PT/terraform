name: Deploy Prod
on:
  push:
    tags:
      - 'v*-rc.*'

permissions:
  id-token: write
  contents: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Promote to prod tag
        run: |
          # Extract version: v0.0.3-rc.1 → v0.0.3
          VERSION="${GITHUB_REF_NAME}"           # e.g. v0.0.3-rc.1
          PROD_TAG="${VERSION%-rc.*}-prod"        # e.g. v0.0.3-prod

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$PROD_TAG"
          git push origin "$PROD_TAG"
          