name: Deploy Prod
on:
  push:
    tags:
      - 'v*-rc.*'

permissions:
  id-token: write
  contents: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::921142537307:role/terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Promote to prod tag
        run: |
          # Extract version: v0.0.3-rc.1 → v0.0.3
          VERSION="${GITHUB_REF_NAME}"           # e.g. v0.0.3-rc.1
          PROD_TAG="${VERSION%-rc.*}-prod"        # e.g. v0.0.3-prod

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "$PROD_TAG"
          git push origin "$PROD_TAG"

          # Pass prod tag to next steps
          echo "PROD_TAG=$PROD_TAG" >> $GITHUB_ENV

      - name: Create GitHub Release & Deployment
        uses: actions/github-script@v7
        with:
          script: |
            const prodTag = process.env.PROD_TAG;

            // 1. Create a Release (shows up in Releases UI)
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              tag_name:               prodTag,
              name:                   `Release ${prodTag}`,
              generate_release_notes: true,   // auto-fills changelog from PRs/commits
              prerelease:             false,
            });

            // 2. Create a Deployment (shows up in Deployments UI)
            const deploy = await github.rest.repos.createDeployment({
              owner:             context.repo.owner,
              repo:              context.repo.repo,
              ref:               prodTag,
              environment:       'production',
              description:       `Deploying ${prodTag} to production`,
              auto_merge:        false,
              required_contexts: [],          // skip additional status checks
            });

            // 3. Mark the Deployment as successful
            await github.rest.repos.createDeploymentStatus({
              owner:          context.repo.owner,
              repo:           context.repo.repo,
              deployment_id:  deploy.data.id,
              state:          'success',
              description:    `${prodTag} is live`,
              environment_url: 'https://your-production-url.com',  // optional but recommended
            });