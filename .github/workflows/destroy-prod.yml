name: "Destroy Prod (manual)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: github.event.inputs.confirm == 'DESTROY' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (destroy Tier 2)
        run: |
          terraform plan -destroy -input=false -out=tfplan \
            -target='module.ecs' \
            -target='aws_lb.service["review_service"]' \
            -target='aws_lb_target_group.service["review_service"]' \
            -target='aws_lb_listener.service["review_service"]' \
            -target='aws_lb.service["spot_service"]' \
            -target='aws_lb_target_group.service["spot_service"]' \
            -target='aws_lb_listener.service["spot_service"]' \
            -target='aws_lb.service["spot_submission_service"]' \
            -target='aws_lb_target_group.service["spot_submission_service"]' \
            -target='aws_lb_listener.service["spot_submission_service"]'

      - name: Terraform Destroy (Tier 2)
        run: terraform apply -auto-approve tfplan
