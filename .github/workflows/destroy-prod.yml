name: "Destroy Prod (manual)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (destroy)
        env:
          TF_VAR_image_uri: "921142537307.dkr.ecr.ap-southeast-1.amazonaws.com/makango-review-service:destroy-dummy"
        run: terraform plan -destroy -input=false -out=tfplan

      - name: Terraform Destroy
        env:
          TF_VAR_image_uri: "921142537307.dkr.ecr.ap-southeast-1.amazonaws.com/makango-review-service:destroy-dummy"
        run: terraform destroy -auto-approve -input=false tfplan