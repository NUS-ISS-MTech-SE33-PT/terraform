name: "Destroy Prod (manual)"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    if: ${{ github.event.inputs.confirm == 'DESTROY' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: environments/prod

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-terraform-prod-role
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan (destroy Tier 2)
        run: |
          terraform plan -destroy -input=false -out=tfplan \
            -target=aws_ecs_cluster.prod_cluster \
            -target=aws_ecs_service.review_service \
            -target=aws_ecs_task_definition.review_service_task \
            -target=aws_lb_listener.review_service_network_load_balancer_listener \
            -target=aws_lb_target_group.review_service_target_group \
            -target=aws_lb.review_service_network_load_balancer \
            -target=aws_ecs_service.spot_service \
            -target=aws_ecs_task_definition.spot_service_task \
            -target=aws_lb_listener.spot_service_network_load_balancer_listener \
            -target=aws_lb_target_group.spot_service_target_group \
            -target=aws_lb.spot_service_network_load_balancer \
            -target=aws_ecs_service.spot_submission_service \
            -target=aws_ecs_task_definition.spot_submission_service_task \
            -target=aws_lb_listener.spot_submission_service_network_load_balancer_listener \
            -target=aws_lb_target_group.spot_submission_service_target_group \
            -target=aws_lb.spot_submission_service_network_load_balancer

      - name: Terraform Destroy (Tier 2)
        run: terraform apply -auto-approve tfplan
